services:
  app:
    build: .
    container_name: lba_app
    ports:
      - "8080:80"           # access via http://localhost:8080
    volumes:
      - .:/var/www/html     # mount project files
    depends_on:
      - db
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public

  db:
    image: mysql:8.0
    container_name: lba_db
    restart: unless-stopped
    ports:
      - "3307:3306"         # avoid conflict with XAMPP
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=library_booking
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=apppass
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lba_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"           # access via http://localhost:8081
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=secret
    depends_on:
      - db

  # Optional: Mailhog to test email (OTP, etc.)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: lba_mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"         # web ui: http://localhost:8025
      - "1025:1025"         # smtp host=mailhog port=1025

volumes:
  db_data:
